name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate ML dataset gate
        run: python3 -m unittest discover -s ml/tests

      - name: Install backend dependencies
        run: python3 -m pip install -r backend/requirements-dev.txt

      - name: Test backend API
        run: python3 -m pytest backend/tests

      - name: Audit backend dependencies
        run: python3 -m pip_audit -r backend/requirements.txt

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e
