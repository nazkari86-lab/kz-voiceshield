name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write   # needed to upload assets to GitHub releases

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Install mobile dependencies
        run: npm ci

      - name: Fetch whisper.cpp
        run: ./scripts/fetch-whisper.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --runInBand

      - name: Build release APK
        run: ./android/gradlew -p android assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p ../dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             ../dist/kz-voiceshield-android.apk
        working-directory: mobile

      - name: Upload APK artifact (always kept for 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: kz-voiceshield-release-apk
          path: dist/kz-voiceshield-android.apk
          if-no-files-found: error

      # NOTE: auto-publishing the CI APK to the latest release was removed.
      # Without the release signing key (kept out of git), CI produces a
      # debug-signed APK, and blindly clobbering the curated release asset
      # shipped an unsigned/older build to users. Release APKs are now built
      # and signed locally with the real release key, then attached by hand.
      # The build artifact above is still kept for 90 days for testing.
