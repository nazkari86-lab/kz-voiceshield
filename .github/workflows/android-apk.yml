name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write   # needed to upload assets to GitHub releases

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Install mobile dependencies
        run: npm ci

      - name: Fetch whisper.cpp
        run: ./scripts/fetch-whisper.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --runInBand

      - name: Build release APK
        run: ./android/gradlew -p android assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p ../dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             ../dist/kz-voiceshield-android.apk
        working-directory: mobile

      - name: Upload APK artifact (always kept for 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: kz-voiceshield-release-apk
          path: dist/kz-voiceshield-android.apk
          if-no-files-found: error

      - name: Publish APK to latest GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent release (draft or published) and upload the APK.
          # If no release exists yet the step is skipped gracefully.
          RELEASE_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$RELEASE_TAG" ]; then
            echo "No release found — skipping upload to release."
            exit 0
          fi
          echo "Uploading APK to release: $RELEASE_TAG"
          # Delete previous APK asset if it exists (prevents 'already exists' error on re-runs)
          gh release delete-asset "$RELEASE_TAG" kz-voiceshield-android.apk --yes 2>/dev/null || true
          gh release upload "$RELEASE_TAG" dist/kz-voiceshield-android.apk --clobber
          echo "APK uploaded to $RELEASE_TAG successfully."
        working-directory: ${{ github.workspace }}
