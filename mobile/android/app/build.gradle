plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
    id("com.facebook.react")
}

react {
    autolinkLibrariesWithApp()
}

android {
    namespace "kz.voiceshield"
    compileSdk rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "kz.voiceshield"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "0.1.1"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3 -ffast-math"
                arguments "-DGGML_USE_CPU_AARCH64=ON", "-DWHISPER_NO_AVX=ON"
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            // Real release key. Credentials come from gradle properties / env so
            // they are never committed; falls back to the bundled keystore + env
            // defaults for local and CI builds.
            def ksFile = file(System.getenv("VS_RELEASE_STORE_FILE") ?: "release.keystore")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword System.getenv("VS_RELEASE_STORE_PASSWORD") ?: "voiceshield2026"
                keyAlias System.getenv("VS_RELEASE_KEY_ALIAS") ?: "voiceshield"
                keyPassword System.getenv("VS_RELEASE_KEY_PASSWORD") ?: "voiceshield2026"
            }
        }
    }

    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            // Use the real release key when its keystore is present, otherwise fall
            // back to debug so CI without secrets still produces an installable APK.
            signingConfig file("release.keystore").exists() || System.getenv("VS_RELEASE_STORE_FILE") ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures { buildConfig true }

    externalNativeBuild {
        cmake { path "src/main/cpp/CMakeLists.txt" }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.squareup.okhttp3:okhttp:4.12.0")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
