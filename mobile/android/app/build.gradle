plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
    id("com.facebook.react")
}

react {
    autolinkLibrariesWithApp()
}

// Release signing is configured via android/keystore.properties (git-ignored).
// Locally: created once next to this project. In CI: written from repo secrets.
// No signing passwords live in version control.
def keystorePropsFile = rootProject.file("keystore.properties")
def keystoreProps = new Properties()
def hasReleaseSigning = false
if (keystorePropsFile.exists()) {
    keystorePropsFile.withInputStream { keystoreProps.load(it) }
    hasReleaseSigning = keystoreProps["storeFile"] != null &&
        rootProject.file(keystoreProps["storeFile"]).exists()
}

android {
    namespace "kz.voiceshield"
    compileSdk rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    defaultConfig {
        applicationId "kz.voiceshield"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 37
        versionName "2.0.3"

        // Pilot distribution targets physical Android phones. Keeping the
        // release to ARM avoids shipping emulator-only native runtimes.
        ndk { abiFilters "arm64-v8a", "armeabi-v7a" }

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3 -ffast-math"
                arguments "-DGGML_USE_CPU_AARCH64=ON", "-DWHISPER_NO_AVX=ON"
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        if (hasReleaseSigning) {
            release {
                storeFile rootProject.file(keystoreProps["storeFile"])
                storePassword keystoreProps["storePassword"]
                keyAlias keystoreProps["keyAlias"]
                keyPassword keystoreProps["keyPassword"]
            }
        }
    }

    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            // Use the real release key when keystore.properties resolves it,
            // otherwise fall back to debug so a build without the secret still
            // produces an installable (debug-signed) APK.
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures { buildConfig true }

    externalNativeBuild {
        cmake { path "src/main/cpp/CMakeLists.txt" }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.squareup.okhttp3:okhttp:4.12.0")
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")
    // On-device screenshot OCR and QR extraction. Bundled models keep the
    // scanner available without a network connection after APK install.
    implementation("com.google.mlkit:text-recognition:16.0.1")
    implementation("com.google.mlkit:barcode-scanning:17.3.0")
    // On-device LLM inference (Gemma 3 1B IT INT4 via MediaPipe).
    // Gemma 3 support and explicit CPU/GPU backend selection require 0.10.27.
    implementation("com.google.mediapipe:tasks-genai:0.10.27")
    testImplementation("junit:junit:4.13.2")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
