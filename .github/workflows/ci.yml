name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Check release version consistency
        run: npm run check:version

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate ML dataset gate
        run: python3 -m unittest discover -s ml/tests

      - name: Install backend dependencies
        run: python3 -m pip install -r backend/requirements-dev.txt

      - name: Test backend API
        run: python3 -m pytest backend/tests

      - name: Audit backend dependencies
        run: python3 -m pip_audit -r backend/requirements.txt

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e

  mobile:
    name: Mobile TypeScript and Jest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile dependencies
        run: npm ci --prefix mobile
      - name: Mobile typecheck
        run: npm run typecheck --prefix mobile
      - name: Mobile tests
        run: npm test --prefix mobile -- --runInBand

  android-release-build:
    name: Android release build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install mobile dependencies
        run: npm ci --prefix mobile
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Assemble Android release
        working-directory: mobile/android
        run: ./gradlew :app:assembleRelease --console=plain
